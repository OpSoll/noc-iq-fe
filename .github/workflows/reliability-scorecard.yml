name: Reliability Scorecard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 07:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  scorecard:
    name: Generate reliability scorecard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --reporter=json --outputFile=test-results.json
        continue-on-error: true
        id: tests

      - name: Run linter
        run: npm run lint -- --format json > lint-results.json 2>&1
        continue-on-error: true
        id: lint

      - name: Generate scorecard
        run: node scripts/generate-scorecard.mjs
        env:
          TEST_EXIT_CODE: ${{ steps.tests.outcome == 'success' && '0' || '1' }}

      - name: Upload scorecard artifact
        uses: actions/upload-artifact@v4
        with:
          name: reliability-scorecard
          path: docs/RELIABILITY_SCORECARD.md
          retention-days: 90

      - name: Post scorecard summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const scorecard = fs.readFileSync('docs/RELIABILITY_SCORECARD.md', 'utf8');
            // Post first 3000 chars as PR comment to stay within limits
            const summary = scorecard.slice(0, 3000) + (scorecard.length > 3000 ? '\n\n_[truncated — see artifact for full scorecard]_' : '');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });
